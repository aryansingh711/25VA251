<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Content Changer</title>
</head>
<body>
    <div>
        <h2 id="mainheading">Welcome To JavaScript Lab</h2>
        <input id="userInput" type="text" placeholder="Enter the text here">
        <br><br>

        <button id="headingbtn">Change the heading</button>
        <button id="backgroundbtn">Change Background</button>
        <button id="showbtn">Show/Hide Paragraph</button>
        <button id="fontsizebtn">Increase Font Size</button>
        <button id="resetbtn">Reset</button>
        <br>
        <p id="paragraph">This is a sample paragraph. JavaScript can change the dynamic content of the page.</p>
    </div>
    <script src="Exp6.js"></script>
</body>
</html>

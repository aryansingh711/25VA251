<!DOCTYPE html>
<html>
<head>
    <title>DOM Manipulation and Event Handling</title>
    <style>
        body {
            text-align: center;
            margin-top: 50px;
        }

        button {
            margin: 5px;
            padding: 8px 15px;
        }
    </style>
</head>
<body>

    <h1 id="heading">Welcome to JavaScript DOM</h1>

    <p id="para">
        This paragraph can be shown, hidden, and modified using JavaScript.
    </p>

    <input type="text" id="userInput" placeholder="Enter new heading text">
    <br><br>

    <button id="changeText">Change Heading</button>
    <button id="changeColor">Change Background</button>
    <button id="changeFont">Increase Font Size</button>
    <button id="togglePara">Show/Hide Paragraph</button>
    <button id="resetPage">Reset</button>

    <script>
        const heading = document.getElementById("heading");
        const para = document.getElementById("para");
        const input = document.getElementById("userInput");

        document.getElementById("changeText").addEventListener("click", function() {
            heading.textContent = input.value || "Welcome to JavaScript DOM";
        });

        document.getElementById("changeColor").addEventListener("click", function() {
            document.body.style.backgroundColor = "lightblue";
        });

        document.getElementById("changeFont").addEventListener("click", function() {
            heading.style.fontSize = "40px";
        });

        document.getElementById("togglePara").addEventListener("click", function() {
            if (para.style.display === "none")
                para.style.display = "block";
            else
                para.style.display = "none";
        });

        document.getElementById("resetPage").addEventListener("click", function() {
            heading.textContent = "Welcome to JavaScript DOM";
            heading.style.fontSize = "32px";
            document.body.style.backgroundColor = "white";
            para.style.display = "block";
            input.value = "";
        });
    </script>

</body>
</html>
